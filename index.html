<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CRM - Client Lead Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>📊 Client Lead Management System</h1>
            <p>Future Interns - Task 2 Mini CRM</p>
        </header>

        <!-- Dashboard Cards -->

        <div class="cards">

            <div class="card">
                <h3>Total Leads</h3>
                <p id="totalLeads">0</p>
            </div>

            <div class="card">
                <h3>New Leads</h3>
                <p id="newLeads">0</p>
            </div>

            <div class="card">
                <h3>Converted Leads</h3>
                <p id="convertedLeads">0</p>
            </div>

        </div>

        <!-- Add Lead Form -->

        <div class="form-section">

            <h2>Add New Lead</h2>

            <form id="leadForm">

                <input
                    type="text"
                    id="name"
                    placeholder="Enter Lead Name"
                    required
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email"
                    required
                >

                <select id="source">
                    <option>Website</option>
                    <option>LinkedIn</option>
                    <option>Instagram</option>
                    <option>Referral</option>
                </select>

                <select id="status">
                    <option>New</option>
                    <option>Contacted</option>
                    <option>Converted</option>
                </select>

                <button type="submit">
                    Add Lead
                </button>

            </form>

        </div>

        <!-- Leads Table -->

        <div class="table-section">

            <h2>Lead Records</h2>

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Source</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="leadTable">

                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
